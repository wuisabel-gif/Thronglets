<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Thronglets</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="terminal" aria-label="Thronglets playable terminal">
      <header class="terminal-bar">
        <div class="window-dots" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
        </div>
        <div class="terminal-title">thronglets --web</div>
        <a href="https://github.com/wuisabel-gif/Thronglets">github</a>
      </header>

      <section class="screen">
        <canvas id="world" width="960" height="720" aria-label="Playable Thronglets world"></canvas>
      </section>

      <footer class="terminal-footer">
        <div class="readout">
          <span id="status">booting wasm...</span>
          <span>day <b id="day">0</b></span>
          <span>pop <b id="pop">0</b></span>
          <span>eggs <b id="eggs">0</b></span>
          <span>faded <b id="faded">0</b></span>
          <span>ideas <b id="ideas">0</b></span>
        </div>

        <div class="command-row">
          <button id="food"><span>F</span> food</button>
          <button id="egg"><span>E</span> egg</button>
          <button id="idea"><span>T</span> idea</button>
          <button id="theme"><span>t</span> theme</button>
        </div>
      </footer>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
